<script>
    // System Parameters - Hardcoded at generation time per player directory
    const PLAYER_ID = "806198"; 

    // Helper to force calculation strictly in US/Eastern time
    function getTargetSlateDate() {
        const now = new Date();
        // Convert local time to an interactive EST/EDT timestamp string
        const estStr = now.toLocaleString("en-US", { timeZone: "America/New_York" });
        const estDate = new Date(estStr);
        
        const hours = estDate.getHours();
        
        // If it's before 7:00 AM Eastern, lock onto yesterday's date
        if (hours < 7) {
            estDate.setDate(estDate.getDate() - 1);
        }
        
        // Format as YYYY-MM-DD safely
        const yyyy = estDate.getFullYear();
        const mm = String(estDate.getMonth() + 1).padStart(2, '0');
        const dd = String(estDate.getMonth() + 2).padStart(2, '0'); // Safe padding
        
        // Manual construction to prevent UTC alignment shifting shifts
        const day = String(estDate.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${day}`;
    }

    async function loadPlayerProfileData() {
        const targetDateStr = getTargetSlateDate();
        let foundOnActiveSlate = false;
        let todayGameContext = null;

        // ==========================================
        // 1. SAFE LIVE ENGINE LOOKUP LOOP
        // ==========================================
        try {
            const liveRes = await fetch(`https://mlbstartingnine.com/data/LIVE/live_mlb_${targetDateStr}.json?v=` + Date.now());
            
            if (liveRes.ok) {
                const liveData = await liveRes.json();
                
                for (const [gamePk, gameCtx] of Object.entries(liveData)) {
                    const awayBox = gameCtx.players?.AWAY || {};
                    const homeBox = gameCtx.players?.HOME || {};
                    
                    if (awayBox["ID" + PLAYER_ID] || homeBox["ID" + PLAYER_ID]) {
                        foundOnActiveSlate = true;
                        todayGameContext = gameCtx;
                        
                        const sideLabel = awayBox["ID" + PLAYER_ID] ? "AWAY" : "HOME";
                        const playerBox = gameCtx.players[sideLabel]["ID" + PLAYER_ID];
                        const roleProfile = playerBox.batting || playerBox.pitching;

                        if (roleProfile && roleProfile.summary) {
                            document.getElementById('live-console-hub').style.display = "block";
                            document.getElementById('live-summary-string').textContent = roleProfile.summary;
                            document.getElementById('live-dk-points').innerHTML = `${playerBox.dk_pts.toFixed(1)} <span style="font-size:0.65rem; font-weight: normal; color:#6c757d;">Pts</span>`;
                            document.getElementById('live-fd-points').innerHTML = `${playerBox.fd_pts.toFixed(1)} <span style="font-size:0.65rem; font-weight: normal; color:#6c757d;">Pts</span>`;
                        }

                        if (gameCtx.status === "Final") {
                            document.getElementById('live-game-state-label').innerHTML = `<strong>Game Status:</strong> Final`;
                        } else {
                            let half = gameCtx.half || "";
                            let inning = gameCtx.inning ? gameCtx.inning.replace(/\D/g, '') : "";
                            document.getElementById('live-game-state-label').innerHTML = `<strong>Game Status:</strong> Live (${half} ${inning})`;
                        }
                        break;
                    }
                }
            }
        } catch (e) {
            console.log("Live slate lookup bypassed or file not ready.");
        }

        if (!foundOnActiveSlate) {
            const badge = document.getElementById('live-lineup-badge');
            if (badge) {
                badge.className = "badge status-badge-none d-flex flex-column align-items-center justify-content-center px-3 py-2 rounded shadow-sm text-center flex-shrink-0";
                badge.innerHTML = `<div class="fw-bold" style="font-size: 0.85rem; letter-spacing: 0.5px;">⬜ INACTIVE</div><div class="text-uppercase mt-1 opacity-90 fw-semibold" style="font-size: 0.7rem; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 2px; width: 100%;">Not on Slate</div>`;
            }
            document.getElementById('live-game-state-label').innerHTML = `<strong>Game Status:</strong> Completed / Off-Day`;
            document.getElementById('live-console-hub').style.display = "none";
            document.getElementById('bvp-active-card').classList.add('d-none');
            document.getElementById('bvp-fallback-card').classList.remove('d-none');
            document.getElementById('hr-probability-card').classList.add('d-none');
        }

        // ==========================================
        // 2. FIXED MASTER LOG COMPILATION LOOKUP
        // ==========================================
        try {
            const masterRes = await fetch(`https://mlbstartingnine.com/data/player_master_data.json`);
            if (masterRes.ok) {
                const masterData = await masterRes.json();
                const p = masterData["ID" + PLAYER_ID];

                if (p) {
                    // Update Hero Header Identities
                    document.getElementById('player-name-header').textContent = p.name;
                    document.getElementById('player-headshot-img').alt = p.name;
                    
                    // FIXED: Replaced python 'or' syntax loops with valid JS logical '||' pipes
                    if (p.is_pitcher) {
                        const wins = p.season?.w !== undefined ? p.season.w : 0;
                        const losses = p.season?.l !== undefined ? p.season.l : 0;
                        const era = p.season?.era || '-';
                        
                        document.getElementById('player-meta-sub').textContent = `Pitcher • ${wins}-${losses} • ${era} ERA`;
                        document.getElementById('split-vl-header').innerHTML = `<span class="badge bg-secondary me-1">LHB</span> vs. Left-Handed Batters`;
                        document.getElementById('split-vr-header').innerHTML = `<span class="badge bg-dark me-1">RHB</span> vs. Right-Handed Batters`;
                        document.getElementById('split-vl-label-volume').textContent = "Batters Faced:";
                        document.getElementById('split-vr-label-volume').textContent = "Batters Faced:";
                        document.getElementById('split-vl-label-hr').textContent = "HR Allowed:";
                        document.getElementById('split-vr-label-hr').textContent = "HR Allowed:";
                    } else {
                        const avg = p.season?.avg || '-';
                        const hr = p.season?.hr !== undefined ? p.season.hr : 0;
                        document.getElementById('player-meta-sub').textContent = `Position Player • ${avg} AVG • ${hr} HR`;
                    }

                    // Populate Splits safely
                    const vl = p.split_vL || {};
                    const vr = p.split_vR || {};
                    
                    document.getElementById('split-vl-vol').textContent = vl.ab || 0;
                    document.getElementById('split-vl-avg').textContent = vl.avg || '-';
                    document.getElementById('split-vl-ops').textContent = vl.ops || '-';
                    document.getElementById('split-vl-hr').textContent = vl.hr || 0;

                    document.getElementById('split-vr-vol').textContent = vr.ab || 0;
                    document.getElementById('split-vr-avg').textContent = vr.avg || '-';
                    document.getElementById('split-vr-ops').textContent = vr.ops || '-';
                    document.getElementById('split-vr-hr').textContent = vr.hr || 0;

                    // Populate Log Table
                    const logTableBody = document.getElementById('game-historical-tbody');
                    const logs = p.game_log || [];

                    if (logs.length > 0) {
                        logTableBody.innerHTML = logs.map(log => `
                            <tr>
                                <td class="text-start ps-3 fw-bold">${log.date}</td>
                                <td>${log.summary}</td>
                                <td class="dk-accent">${typeof log.dk_pts === 'number' ? log.dk_pts.toFixed(2) : log.dk_pts}</td>
                                <td class="fd-accent">${typeof log.fd_pts === 'number' ? log.fd_pts.toFixed(1) : log.fd_pts}</td>
                            </tr>
                        `).join('');
                    } else {
                        logTableBody.innerHTML = `<tr><td colspan="4" class="text-center p-3 text-muted">No recent game lines logged.</td></tr>`;
                    }
                }
            }
        } catch (e) {
            // FIXED: Changed python print to javascript console exception tracking
            console.error("Failed to parse player details out of master database registry:", e);
        }
    }

    window.addEventListener('DOMContentLoaded', loadPlayerProfileData);
</script>
