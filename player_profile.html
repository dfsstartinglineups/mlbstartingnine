<script>
    // Config parameters mapped by your page generation framework
    const PLAYER_ID = "806198"; // Hardcoded on page creation (e.g., Cooper Pratt)
    const PLAYER_SIDE = "AWAY";  // Hardcoded based on current day's matchup context
    const GAME_PK = "700000";    // Hardcoded current game ID reference if on slate

    // Helper to format text strings or fallback safely
    const formatStat = (val) => (val !== undefined && val !== null) ? val : '-';

    async function loadPlayerProfileData() {
        const todayStr = new Date().toISOString().split('T')[0];
        let foundOnActiveSlate = false;

        // ==========================================
        // 1. LIVE ENGINE LOOKUP (Today's Slate File)
        // ==========================================
        try {
            const liveRes = await fetch(`https://mlbstartingnine.com/data/LIVE/live_mlb_${todayStr}.json?v=` + Date.now());
            if (liveRes.ok) {
                const liveData = await liveRes.json();
                const activeGame = liveData[GAME_PK];
                
                // Verify game exists and has crossed into an active status context
                if (activeGame && (activeGame.status === "Live" || activeGame.status === "In Progress" || activeGame.inning)) {
                    foundOnActiveSlate = true;
                    
                    // Update Game Status Label in Hero
                    let halfStr = activeGame.half ? activeGame.half : '';
                    let inningStr = activeGame.inning ? activeGame.inning.replace(/\D/g, '') : '';
                    document.getElementById('live-game-state-label').innerHTML = `<strong>Game Status:</strong> Live (${halfStr} ${inningStr})`;
                    
                    // Unpack player tracking data
                    const pidStr = "ID" + PLAYER_ID;
                    const teamRoster = activeGame.players ? activeGame.players[PLAYER_SIDE] : null;
                    const playerBox = teamRoster ? teamRoster[pidStr] : null;
                    
                    if (playerBox) {
                        const profile = playerBox.batting || playerBox.pitching;
                        if (profile && profile.summary) {
                            // Paint Real-Time Box Score HUD Elements
                            document.getElementById('live-console-hub').style.display = "block";
                            document.getElementById('live-summary-string').textContent = profile.summary;
                            document.getElementById('live-dk-points').innerHTML = `${playerBox.dk_pts.toFixed(1)} <span style="font-size:0.65rem; font-weight: normal; color:#6c757d;">Pts</span>`;
                            document.getElementById('live-fd-points').innerHTML = `${playerBox.fd_pts.toFixed(1)} <span style="font-size:0.65rem; font-weight: normal; color:#6c757d;">Pts</span>`;
                        }
                    }
                } else if (activeGame && activeGame.status === "Final") {
                    foundOnActiveSlate = true;
                    document.getElementById('live-game-state-label').innerHTML = `<strong>Game Status:</strong> Final`;
                }
            }
        } catch (e) {
            console.log("No live game context running for this player profile today.");
        }

        // Handle off-day UI transitions if the player isn't on today's active live feed
        if (!foundOnActiveSlate) {
            const badge = document.getElementById('live-lineup-badge');
            if (badge) {
                badge.className = "badge status-badge-none d-flex flex-column align-items-center justify-content-center px-3 py-2 rounded shadow-sm text-center flex-shrink-0";
                badge.innerHTML = `<div class="fw-bold" style="font-size: 0.85rem; letter-spacing: 0.5px;">⬜ INACTIVE</div><div class="text-uppercase mt-1 opacity-90 fw-semibold" style="font-size: 0.7rem; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 2px; width: 100%;">Not on Slate</div>`;
            }
            document.getElementById('live-game-state-label').innerHTML = `<strong>Game Status:</strong> Completed / Off-Day`;
            document.getElementById('live-console-hub').style.display = "none";
            document.getElementById('bvp-active-card').classList.add('d-none');
            document.getElementById('bvp-fallback-card').classList.remove('d-none');
            document.getElementById('hr-probability-card').classList.add('d-none');
        }

        // ==========================================
        // 2. BACKEND COMPILATION LOOKUP (Master File)
        // ==========================================
        try {
            const masterRes = await fetch(`https://mlbstartingnine.com/data/player_master_data.json`);
            if (masterRes.ok) {
                const masterData = await masterRes.json();
                const playerProfile = masterData["ID" + PLAYER_ID];

                if (playerProfile) {
                    // Inject Season Statistics Safely
                    const s = playerProfile.season || {};
                    if (playerProfile.is_pitcher) {
                        // If player is a pitcher, update labels to handle IP/ERA matrices
                        // (You can wire structural DOM manipulations here if managing pitchers)
                    }

                    // Populate 10-Game Historical Logs Matrix
                    const logTableBody = document.getElementById('game-historical-tbody');
                    const historyLogs = playerProfile.game_log || [];

                    if (historyLogs.length > 0) {
                        logTableBody.innerHTML = historyLogs.map(log => `
                            <tr>
                                <td class="text-start ps-3 fw-bold">${log.date}</td>
                                <td>${log.summary}</td>
                                <td class="dk-accent">${typeof log.dk_pts === 'number' ? log.dk_pts.toFixed(1) : log.dk_pts}</td>
                                <td class="fd-accent">${typeof log.fd_pts === 'number' ? log.fd_pts.toFixed(1) : log.fd_pts}</td>
                            </tr>
                        `).join('');
                    } else {
                        logTableBody.innerHTML = `<tr><td colspan="4" class="text-center p-3 text-muted">No recent game history recorded.</td></tr>`;
                    }
                }
            }
        } catch (e) {
            print("Failed to sync structural asset historical payloads out of player database.");
        }
    }

    window.addEventListener('DOMContentLoaded', loadPlayerProfileData);
</script>
