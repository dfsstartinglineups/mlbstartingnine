name: Nightly Umpire Data Update

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # NEW: Cache the pybaseball data directory
      - name: Cache Pybaseball
        uses: actions/cache@v3
        with:
          path: ~/.pybaseball
          key: pybaseball-v1-${{ github.run_id }}
          restore-keys: |
            pybaseball-v1-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybaseball pandas requests

      - name: Run Umpire Builder Script
        run: python umpire_builder.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/umpires.json
          
          # Check if there are staged changes ready to be committed
          if ! git diff --quiet --staged; then
            git commit -m "Automated update: Umpire stats [skip ci]"
            
            # Pull latest changes and rebase BEFORE pushing
            git pull --rebase origin main || echo "Nothing to pull"
            
            # Try pushing. If rejected, pull again and immediately push.
            git push origin main || (git pull --rebase origin main && git push origin main)
          else
            echo "No new umpire stats. Skipping commit."
          fi
