name: Nightly Umpire Data Update

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # NEW: Cache the pybaseball data directory
      - name: Cache Pybaseball
        uses: actions/cache@v3
        with:
          path: ~/.pybaseball
          key: pybaseball-v1-${{ github.run_id }}
          restore-keys: |
            pybaseball-v1-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybaseball pandas requests

      - name: Run Umpire Builder Script
        run: python umpire_builder.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add data/umpires.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: Umpire stats" && git push)
