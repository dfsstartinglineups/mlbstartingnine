name: MLB_Live_Scraper

on:
  workflow_dispatch:
  # Uncomment the lines below if you want GitHub to automatically run this every 5 minutes
  # schedule:
  #   - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  update-live-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run MLB Live Scraper
        run: python scripts/scrape_mlb_live.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage the new LIVE directory where the script saves its data
          git add data/LIVE/
          
          # Check if there are staged changes ready to be committed
          if ! git diff --quiet --staged; then
            git commit -m "⚡ Automated update: MLB Live Stats [skip ci]"
            
            # Pull latest changes and rebase BEFORE pushing to avoid conflicts with the main scraper
            git pull --rebase origin main || echo "Nothing to pull"
            
            # Try pushing. If rejected, pull again and immediately push.
            git push origin main || (git pull --rebase origin main && git push origin main)
          else
            echo "No new MLB live stats. Skipping commit."
          fi
