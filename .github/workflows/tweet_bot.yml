name: MLB & NBA X Bot

on:
  workflow_dispatch: # <--- This is the listener for your outside cron ping!

permissions:
  contents: write

# ==========================================
# 🛑 THE ANTI-DUPLICATE FIX
# ==========================================
concurrency:
  group: tweet-bot-production
  cancel-in-progress: false
# ==========================================  

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 1. 🛑 ADD THIS: Use the official Playwright container with all OS dependencies pre-installed
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

        # 🛑 ADD THIS STEP: Installs the missing OS utility for setup-python
      - name: Install lsb-release
        run: apt-get update && apt-get install -y lsb-release

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tweepy atproto firebase-admin playwright
          playwright install chromium
          # 3. 🛑 REMOVED: `playwright install-deps` (No longer needed, saving you from mirror throttling!)

      - name: Run Tweet Bot
        env:
          # MLB Main Account Keys
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          # NBA @DailyNBAlineups Keys
          NBA_X_API_KEY: ${{ secrets.NBA_X_API_KEY }}
          NBA_X_API_SECRET: ${{ secrets.NBA_X_API_SECRET }}
          NBA_X_ACCESS_TOKEN: ${{ secrets.NBA_X_ACCESS_TOKEN }}
          NBA_X_ACCESS_TOKEN_SECRET: ${{ secrets.NBA_X_ACCESS_TOKEN_SECRET }}
          # SERIEA keys
          SERIEA_X_API_KEY: ${{ secrets.SERIEA_X_API_KEY }}
          SERIEA_X_API_SECRET: ${{ secrets.SERIEA_X_API_SECRET }}
          SERIEA_X_ACCESS_TOKEN: ${{ secrets.SERIEA_X_ACCESS_TOKEN }}
          SERIEA_X_ACCESS_TOKEN_SECRET: ${{ secrets.SERIEA_X_ACCESS_TOKEN_SECRET }}
          # FRIENDLY keys
          FRIENDLY_X_API_KEY: ${{ secrets.FRIENDLY_X_API_KEY }}
          FRIENDLY_X_API_SECRET: ${{ secrets.FRIENDLY_X_API_SECRET }}
          FRIENDLY_X_ACCESS_TOKEN: ${{ secrets.FRIENDLY_X_ACCESS_TOKEN }}
          FRIENDLY_X_ACCESS_TOKEN_SECRET: ${{ secrets.FRIENDLY_X_ACCESS_TOKEN_SECRET }}
          NEW_SOCIAL_CREDENTIALS: ${{ secrets.NEW_SOCIAL_CREDENTIALS }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/tweet_bot.py

      - name: Commit Log Silently
        if: always()
        run: |
          # The container runs as root, so we need to tell git this directory is safe
          git config --global --add safe.directory /__w/${{ github.event.repository.name }}/${{ github.event.repository.name }}
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/tweet_log.json
          
          # Check if there are staged changes ready to be committed
          if ! git diff --quiet --staged; then
            git commit -m "📝 Update tweet log [skip ci]"
            
            # The Magic Fix: Pull latest changes and rebase BEFORE pushing
            git pull --rebase origin main || echo "Nothing to pull"
            
            # Try pushing. If rejected, pull again and immediately push.
            git push origin main || (git pull --rebase origin main && git push origin main)
          else
            echo "No new tweets to log. Skipping commit."
          fi
