name: MLB & NBA X Bot

on:
  workflow_dispatch: # <--- This is the listener for your outside cron ping!

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tweepy

      - name: Run Tweet Bot
        env:
          # MLB Main Account Keys
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          # NBA @DailyNBAlineups Keys
          NBA_X_API_KEY: ${{ secrets.NBA_X_API_KEY }}
          NBA_X_API_SECRET: ${{ secrets.NBA_X_API_SECRET }}
          NBA_X_ACCESS_TOKEN: ${{ secrets.NBA_X_ACCESS_TOKEN }}
          NBA_X_ACCESS_TOKEN_SECRET: ${{ secrets.NBA_X_ACCESS_TOKEN_SECRET }}
        run: python scripts/tweet_bot.py

      - name: Commit Log Silently
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/tweet_log.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "📝 Update tweet log [skip ci]" && git push)
