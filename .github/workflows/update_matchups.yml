name: Site_Builder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 selenium webdriver-manager jinja2 pytz

      - name: Run Matchup Fetcher
        run: python scripts/fetch_matchups.py

      - name: Run MLB Live Scraper
        run: python scripts/scrape_mlb_live.py
        
      - name: Generate DFS Directories
        run: python scripts/generate_dfs_directories.py

      - name: Generate Static Lineup Pages
        run: python scripts/generate_team_pages.py

      - name: Generate Player Profiles
        run: python scripts/generate_all_profiles.py

      # 🚀 NEW STEP: Build the main 3-Day Index Landing Page
      - name: Generate Main Index Page
        run: python scripts/build_site.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage data, directories, and the brand new static landing page
          git add data/matchups.json
          git add data/daily_files/
          git add data/LIVE/
          git add dfs/
          git add lineups/
          git add players/
          git add sitemap.xml
          git add sitemap-dfs.xml
          git add index.html # 👈 Track the new static index pipeline output
          
          # Check if there are staged changes ready to be committed
          if ! git diff --quiet --staged; then
            git commit -m "📊 Automated update: Matchups, Live Stats, DFS, Lineups, Profiles & Index [skip ci]"
            
            # Pull latest changes, rebase, and aggressively force our new scrape to win any conflicts
            git pull origin main --rebase --strategy-option=theirs
            
            # Push cleanly to the repository
            git push origin main
          else
            echo "No new updates generated. Skipping commit."
          fi
