<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Live Baseball</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --arcade-blue: #0000a8;
            --arcade-yellow: #f8f800;
            --arcade-white: #fcfcfc;
            --dirt-brown: #c88141;
        }

        body {
            background-color: #111;
            color: var(--arcade-white);
            font-family: 'Press Start 2P', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            width: 800px;
            height: 600px; 
            border: 8px solid var(--arcade-white);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        /* --- CAMERA 1: PITCHING VIEW --- */
        #pitching-camera {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #2d8a4e;
            background-image: url('stadium_images/pitching_view.jpg'); /* The new close-up image */
            background-size: cover;
            background-position: center;
            display: block; /* Visible by default */
            z-index: 1;
        }

        /* --- CAMERA 2: FIELDING VIEW --- */
        #fielding-camera {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #2d8a4e;
            background-image: url('stadium_images/fenway_8bit.jpg'); /* The wide stadium image */
            background-size: cover;
            background-position: center;
            display: none; /* Hidden by default */
            z-index: 1;
        }

        /* --- UI ELEMENTS (These sit on top of whichever camera is active) --- */
        #ui-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Lets clicks pass through to the background if needed */
        }

        #scoreboard {
            background-color: rgba(0, 0, 168, 0.9); 
            border: 4px solid var(--arcade-white);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
        }

        .team-block { text-align: center; font-size: 18px; line-height: 1.5; }
        .score-number { color: var(--arcade-yellow); font-size: 28px; margin-top: 5px; }
        .inning-block { text-align: center; font-size: 12px; color: var(--arcade-yellow); line-height: 1.8; }

        #matchup-block {
            position: absolute;
            bottom: 80px; 
            left: 20px;
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--arcade-white);
            padding: 10px;
            font-size: 10px;
            line-height: 1.8;
        }
        .highlight { color: var(--arcade-yellow); }

        #bases-container {
            position: absolute;
            bottom: 100px;
            right: 50px;
            width: 80px;
            height: 80px;
            transform: rotate(45deg);
        }

        .base {
            width: 25px;
            height: 25px;
            background-color: var(--dirt-brown);
            border: 3px solid var(--arcade-white);
            position: absolute;
            transition: background-color 0.2s;
        }
        .base.occupied { background-color: var(--arcade-yellow); }
        #base-1 { bottom: 0; right: 0; }
        #base-2 { top: 0; right: 0; }
        #base-3 { top: 0; left: 0; }
        #home-plate { bottom: 0; left: 0; background-color: var(--arcade-white); }

        #play-ticker {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            background-color: #000;
            border-top: 4px solid var(--arcade-white);
            padding: 10px 15px;
            font-size: 10px;
            line-height: 1.6;
            height: 45px;
            display: flex;
            align-items: center;
        }

        /* --- THE PITCHING ANIMATION (Now tailored for the close-up view) --- */
        #baseball {
            position: absolute;
            width: 12px;  /* Slightly larger for the close up view */
            height: 12px;
            background-color: #fff;
            border-radius: 50%; 
            transition: top 0.4s linear, left 0.4s linear, width 0.4s, height 0.4s, opacity 0.1s;
            opacity: 0; 
        }

        /* Starts at the pitcher (Bottom center of the close-up view) */
        .on-mound {
            top: 80%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px; /* Ball looks bigger closer to camera */
            height: 16px;
            opacity: 1 !important;
        }

        /* Ends at home plate (Top center of the close-up view) */
        .at-plate {
            top: 30% !important; 
            left: 50% !important; /* We will make this dynamic later based on strike zone data! */
            width: 6px !important; /* Ball gets smaller as it flies away */
            height: 6px !important;
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="pitching-camera">
            <div id="baseball" class="on-mound"></div>
        </div>

        <div id="fielding-camera">
            </div>

        <div id="ui-layer">
            <div id="scoreboard">
                <div class="team-block">
                    <div>AWAY</div>
                    <div id="away-score" class="score-number">0</div>
                </div>
                <div class="inning-block">
                    <div id="inning-state">TOP 1</div>
                    <div>OUTS: <span id="outs-count">0</span></div>
                    <div>COUNT: <span id="pitch-count">0-0</span></div>
                </div>
                <div class="team-block">
                    <div>HOME</div>
                    <div id="home-score" class="score-number">0</div>
                </div>
            </div>

            <div id="matchup-block">
                <div>PITCHING: <br><span id="pitcher-name" class="highlight">WAITING...</span></div>
                <br>
                <div>BATTING: <br><span id="batter-name" class="highlight">WAITING...</span></div>
            </div>

            <div id="bases-container">
                <div id="base-2" class="base"></div>
                <div id="base-3" class="base"></div>
                <div id="base-1" class="base"></div>
                <div id="home-plate" class="base"></div>
            </div>

            <div id="play-ticker">
                > <span id="last-event" style="margin-left: 10px;">CONNECTING TO SERVER...</span>
            </div>
        </div>

    </div>

    <script>
        // (Keep your existing Firebase JS logic down here for now!)
        // In the next step, we will add the JS logic to switch cameras when the ball is hit.
    </script>
</body>
</html>
