<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Live Baseball Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --arcade-blue: #0000a8;
            --arcade-yellow: #f8f800;
            --arcade-white: #fcfcfc;
            --dirt-brown: #c88141;
            --strike-zone-cyan: rgba(0, 255, 255, 0.6);
        }

        body {
            background-color: #111;
            color: var(--arcade-white);
            font-family: 'Press Start 2P', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            width: 800px;
            height: 600px; 
            border: 8px solid var(--arcade-white);
            position: relative;
            overflow: hidden;
            background-color: #2d8a4e;
        }

        /* --- CAMERA SYSTEM --- */
        .camera {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 0.1s ease-in-out;
        }

        #pitching-view {
            background-image: url('stadium_images/pitching_view.jpg');
            z-index: 1;
            opacity: 1;
        }

        #fielding-view {
            background-image: url('stadium_images/fenway_8bit.png');
            z-index: 2;
            opacity: 0;
        }

        /* --- STRIKE ZONE --- */
        #strike-zone-overlay {
            position: absolute;
            top: 58%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 90px;
            border: 2px solid var(--strike-zone-cyan);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            z-index: 4;
            opacity: 0; 
        }
        .zone-cell { border: 1px solid rgba(0, 255, 255, 0.2); }

        /* --- FIELDERS (Only visible when fielding view is active) --- */
        .fielder {
            width: 16px;
            height: 16px;
            position: absolute;
            z-index: 3;
            transition: all 0.3s ease-out; /* Fielder run speed */
            transform: translate(-50%, -50%);
            border: 1px solid var(--arcade-white);
        }
        /* Starting Positions on the 800x600 grid */
        #SS { background-color: var(--arcade-blue); left: 35%; top: 60%; }
        #2B { background-color: var(--arcade-blue); left: 65%; top: 60%; }
        #3B { background-color: var(--arcade-blue); left: 25%; top: 75%; }
        #1B { background-color: var(--arcade-blue); left: 75%; top: 75%; }
        #CF { background-color: #0f0; left: 50%; top: 30%; }
        #LF { background-color: #0f0; left: 20%; top: 35%; }
        #RF { background-color: #0f0; left: 80%; top: 35%; }

        /* --- THE BALL --- */
        #baseball {
            position: absolute;
            background: white;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            z-index: 5;
            opacity: 0;
            transform: translate(-50%, -50%);
        }

        /* --- UI OVERLAY --- */
        #ui-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        #scoreboard {
            background-color: rgba(0, 0, 168, 0.9);
            border: 4px solid var(--arcade-white);
            padding: 10px;
            display: flex;
            justify-content: space-around;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            box-sizing: border-box;
        }
        .score-box { text-align: center; font-size: 14px; }
        .big-num { color: var(--arcade-yellow); font-size: 24px; display: block; margin-top: 5px; }

        #matchup-card {
            position: absolute;
            bottom: 70px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            border: 2px solid white;
            padding: 8px;
            font-size: 10px;
            line-height: 2;
        }

        #bases-diamond {
            position: absolute;
            bottom: 80px;
            right: 40px;
            width: 60px;
            height: 60px;
            transform: rotate(45deg);
        }
        .base {
            width: 18px;
            height: 18px;
            background: var(--dirt-brown);
            border: 2px solid white;
            position: absolute;
        }
        .occupied { background: var(--arcade-yellow) !important; }
        #b2 { top: 0; left: 0; }
        #b1 { top: 0; right: 0; }
        #hp { bottom: 0; right: 0; background: var(--arcade-white); }
        #b3 { bottom: 0; left: 0; }

        #ticker {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 45px;
            background: black;
            border-top: 4px solid white;
            display: flex;
            align-items: center;
            padding-left: 20px;
            font-size: 12px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="pitching-view" class="camera">
            <div id="strike-zone-overlay">
                <div class="zone-cell"></div><div class="zone-cell"></div><div class="zone-cell"></div>
                <div class="zone-cell"></div><div class="zone-cell"></div><div class="zone-cell"></div>
                <div class="zone-cell"></div><div class="zone-cell"></div><div class="zone-cell"></div>
            </div>
        </div>

        <div id="fielding-view" class="camera">
            <div class="fielder" id="SS"></div>
            <div class="fielder" id="2B"></div>
            <div class="fielder" id="3B"></div>
            <div class="fielder" id="1B"></div>
            <div class="fielder" id="CF"></div>
            <div class="fielder" id="LF"></div>
            <div class="fielder" id="RF"></div>
        </div>

        <div id="baseball"></div>

        <div id="ui-layer">
            <div id="scoreboard">
                <div class="score-box">AWAY<span id="away-pts" class="big-num">0</span></div>
                <div class="score-box" style="font-size: 10px; color: var(--arcade-yellow);">
                    <span id="inn-display">WAITING...</span><br>
                    OUTS: <span id="outs-display">0</span><br>
                    <span id="count-display">0-0</span>
                </div>
                <div class="score-box">HOME<span id="home-pts" class="big-num">0</span></div>
            </div>

            <div id="matchup-card">
                P: <span id="p-name" style="color: var(--arcade-yellow);">---</span><br>
                B: <span id="b-name" style="color: var(--arcade-yellow);">---</span>
            </div>

            <div id="bases-diamond">
                <div id="b2" class="base"></div><div id="b3" class="base"></div>
                <div id="b1" class="base"></div><div id="hp" class="base"></div>
            </div>

            <div id="ticker">> <span id="event-text">CONNECTING...</span></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://nbastartingfive-8b420-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const GAME_PK = "823475"; // Update to your game PK!

        const ball = document.getElementById('baseball');
        const pView = document.getElementById('pitching-view');
        const fView = document.getElementById('fielding-view');
        const szOverlay = document.getElementById('strike-zone-overlay');
        let lastTimestamp = null;

        // Reset fielders to starting positions
        function resetFielders() {
            document.getElementById('SS').style.left = '35%'; document.getElementById('SS').style.top = '60%';
            document.getElementById('2B').style.left = '65%'; document.getElementById('2B').style.top = '60%';
            document.getElementById('3B').style.left = '25%'; document.getElementById('3B').style.top = '75%';
            document.getElementById('1B').style.left = '75%'; document.getElementById('1B').style.top = '75%';
            document.getElementById('CF').style.left = '50%'; document.getElementById('CF').style.top = '30%';
            document.getElementById('LF').style.left = '20%'; document.getElementById('LF').style.top = '35%';
            document.getElementById('RF').style.left = '80%'; document.getElementById('RF').style.top = '35%';
        }

        // --- PHASE 2: FIELDING HIT ANIMATION ---
        function simulateHit() {
            // Cut to Fielding Camera
            pView.style.opacity = "0";
            fView.style.opacity = "1";
            szOverlay.style.opacity = "0";

            // Snap ball to home plate in wide view
            ball.style.transition = "none";
            ball.style.top = "85%"; 
            ball.style.left = "50%";
            ball.style.width = "8px";
            ball.style.height = "8px";

            // Randomize hit trajectory (Left field to Right field)
            const targetLeft = 15 + (Math.random() * 70); // 15% to 85% width
            const targetTop = 20 + (Math.random() * 40);  // 20% to 60% height (outfield/infield)

            setTimeout(() => {
                // Ball flies into field
                ball.style.transition = "all 1s cubic-bezier(0.25, 1, 0.5, 1)"; // Decelerates like a hit ball
                ball.style.top = `${targetTop}%`;
                ball.style.left = `${targetLeft}%`;

                // Determine which fielder is closest
                let closestFielder = 'CF';
                if (targetTop > 45) { // Infield
                    if (targetLeft < 45) closestFielder = 'SS';
                    else if (targetLeft < 55) closestFielder = Math.random() > 0.5 ? 'SS' : '2B';
                    else closestFielder = '2B';
                } else { // Outfield
                    if (targetLeft < 35) closestFielder = 'LF';
                    else if (targetLeft > 65) closestFielder = 'RF';
                }

                // Move the chosen fielder to the ball
                setTimeout(() => {
                    document.getElementById(closestFielder).style.top = `${targetTop}%`;
                    document.getElementById(closestFielder).style.left = `${targetLeft}%`;
                }, 100); // Slight reaction delay

            }, 50);

            // Cleanup after play ends
            setTimeout(() => {
                ball.style.opacity = "0";
                resetFielders();
            }, 3000); // 3 seconds to show fielding play
        }

        // --- PHASE 1: PITCHING ANIMATION ---
        function runPitchAnimation(isInPlay, pX, pZ) {
            pView.style.opacity = "1";
            fView.style.opacity = "0";
            szOverlay.style.opacity = "1";

            // Reset ball to Pitcher
            ball.style.transition = "none";
            ball.style.opacity = "1";
            ball.style.top = "90%";
            ball.style.left = "50%";
            ball.style.width = "16px";
            ball.style.height = "16px";

            // Map Coordinates
            let targetLeft = 50; 
            let targetTop = 58;  
            if (pX !== undefined && pX !== null && pZ !== undefined && pZ !== null) {
                targetLeft = 50 - (pX * 6); // Subtracted because camera is Pitcher POV!
                targetTop = 75 - (pZ * 7); 
            }

            // Animate Pitch
            setTimeout(() => {
                ball.style.transition = "all 0.4s linear";
                ball.style.top = `${targetTop}%`; 
                ball.style.left = `${targetLeft}%`;
                ball.style.width = "8px";
                ball.style.height = "8px";
                
                // If it's a hit, hand off to Phase 2
                if (isInPlay) {
                    setTimeout(() => {
                        simulateHit();
                    }, 400); // Trigger hit exactly as pitch reaches plate
                } else {
                    // Standard pitch cleanup
                    setTimeout(() => {
                        ball.style.opacity = "0";
                        szOverlay.style.opacity = "0";
                    }, 1500);
                }
            }, 50);
        }

        // --- FIREBASE LISTENER ---
        db.ref(`mlb_live_games/${GAME_PK}`).on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            if (data.timestamp !== lastTimestamp) {
                const inPlay = data.last_event.toUpperCase().includes("IN PLAY");
                const pX = data.pitch_location ? data.pitch_location.pX : null;
                const pZ = data.pitch_location ? data.pitch_location.pZ : null;
                
                runPitchAnimation(inPlay, pX, pZ);
                lastTimestamp = data.timestamp;
            }

            // Update UI
            document.getElementById('away-pts').innerText = data.score.away;
            document.getElementById('home-pts').innerText = data.score.home;
            document.getElementById('inn-display').innerText = `${data.inning.half} ${data.inning.number}`.toUpperCase();
            document.getElementById('outs-display').innerText = data.count.outs;
            document.getElementById('count-display').innerText = `${data.count.balls}-${data.count.strikes}`;
            document.getElementById('p-name').innerText = data.matchup.pitcher.split(' ').pop().toUpperCase();
            document.getElementById('b-name').innerText = data.matchup.batter.split(' ').pop().toUpperCase();
            document.getElementById('event-text').innerText = data.last_event.toUpperCase();

            document.getElementById('b1').classList.toggle('occupied', data.bases.first);
            document.getElementById('b2').classList.toggle('occupied', data.bases.second);
            document.getElementById('b3').classList.toggle('occupied', data.bases.third);
        });
    </script>
</body>
</html>
