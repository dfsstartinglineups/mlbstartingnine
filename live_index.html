<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Live Baseball</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
    :root {
            --arcade-blue: #0000a8;
            --arcade-yellow: #f8f800;
            --arcade-white: #fcfcfc;
            --dirt-brown: #c88141;
        }

        body {
            background-color: #111;
            color: var(--arcade-white);
            font-family: 'Press Start 2P', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* --- Update the Container path --- */
        #game-container {
            width: 800px;
            height: 600px; 
            background-color: #2d8a4e; /* Fallback turf color so you can test without image */
            background-image: url('stadium_images/fenway_8bit.png'); /* Look inside stadium_images/ */
            background-size: cover;
            background-position: center;
            border: 8px solid var(--arcade-white);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        /* --- THE PITCHING ANIMATION --- */
        #baseball {
            position: absolute;
            width: 8px;  /* Tiny 8-bit square */
            height: 8px;
            background-color: #fff; /* White ball */
            border-radius: 50%; /* Make it round (modern, but looks better) */
            
            /* Define the animation parameters */
            transition: top 0.4s linear, left 0.4s linear, opacity 0.1s;
            z-index: 15; /* Sits above turf, below score */
            opacity: 0; /* Hidden initially */
        }

        /* Position 1: The Pitcher's Mound (Approx Center of screen) */
        .on-mound {
            top: 45%; 
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 1 !important;
        }

        /* Position 2: Home Plate (Bottom center, near play ticker) */
        .at-plate {
            top: 88% !important; /* Move down toward play ticker */
            left: 50% !important;
            opacity: 1 !important;
        }

        /* Where the ball ends up: Home Plate */
        .pitch-thrown {
            top: 85% !important; /* Adjust this percentage to match where home plate sits on your background */
            left: 50% !important;
            opacity: 1 !important;
        }

        /* --- SCOREBOARD (Moved to Center Field) --- */
        #scoreboard {
            background-color: rgba(0, 0, 168, 0.9); /* Slight transparency to see the wall behind it */
            border: 4px solid var(--arcade-white);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            z-index: 10;
        }

        .team-block { text-align: center; font-size: 18px; line-height: 1.5; }
        .score-number { color: var(--arcade-yellow); font-size: 28px; margin-top: 5px; }
        .inning-block { text-align: center; font-size: 12px; color: var(--arcade-yellow); line-height: 1.8; }

        /* --- MATCHUP STATS (Pinned to Bottom Left) --- */
        #matchup-block {
            position: absolute;
            bottom: 80px; 
            left: 20px;
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--arcade-white);
            padding: 10px;
            font-size: 10px;
            line-height: 1.8;
            z-index: 10;
        }
        .highlight { color: var(--arcade-yellow); }

        /* --- FIELD & BASES (Pinned to Bottom Right) --- */
        #bases-container {
            position: absolute;
            bottom: 100px;
            right: 50px;
            width: 80px;
            height: 80px;
            transform: rotate(45deg);
            z-index: 10;
        }

        .base {
            width: 25px;
            height: 25px;
            background-color: var(--dirt-brown);
            border: 3px solid var(--arcade-white);
            position: absolute;
            transition: background-color 0.2s;
        }

        .base.occupied { background-color: var(--arcade-yellow); }

        #base-1 { bottom: 0; right: 0; }
        #base-2 { top: 0; right: 0; }
        #base-3 { top: 0; left: 0; }
        #home-plate { bottom: 0; left: 0; background-color: var(--arcade-white); }

        /* --- PLAY-BY-PLAY TICKER (Pinned to Bottom) --- */
        #play-ticker {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            background-color: #000;
            border-top: 4px solid var(--arcade-white);
            padding: 10px 15px;
            font-size: 10px;
            line-height: 1.6;
            height: 45px;
            display: flex;
            align-items: center;
            z-index: 20;
        }
        </style>
</head>
<body>

    <div id="game-container">
        
        <div id="scoreboard">
            <div class="team-block">
                <div>AWAY</div>
                <div id="away-score" class="score-number">0</div>
            </div>
            <div class="inning-block">
                <div id="inning-state">TOP 1</div>
                <div>OUTS: <span id="outs-count">0</span></div>
                <div>COUNT: <span id="pitch-count">0-0</span></div>
            </div>
            <div class="team-block">
                <div>HOME</div>
                <div id="home-score" class="score-number">0</div>
            </div>
        </div>

        <div id="field-display">
            <div id="matchup-block">
                <div>PITCHING: <br><span id="pitcher-name" class="highlight">WAITING...</span></div>
                <br>
                <div>BATTING: <br><span id="batter-name" class="highlight">WAITING...</span></div>
            </div>

            <div id="bases-container">
                <div id="base-2" class="base"></div>
                <div id="base-3" class="base"></div>
                <div id="base-1" class="base"></div>
                <div id="home-plate" class="base"></div>
            </div>
        </div>
        <div id="baseball" class="on-mound"></div>
        <div id="play-ticker">
            > <span id="last-event" style="margin-left: 10px;">CONNECTING TO SERVER...</span>
        </div>

    </div>

    <script>
        // ========================================================
        // 1. FIREBASE CONFIG & INITIALIZATION
        // ========================================================
        const firebaseConfig = {
            databaseURL: "https://nbastartingfive-8b420-default-rtdb.firebaseio.com/"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.database();
        const GAME_PK = "823475"; // Tigers vs Red Sox (Fenway Park)
        
        // References to UI elements for animation
        const baseballEl = document.getElementById('baseball');

        // State Tracking (To detect when a pitch occurs)
        let previousCountString = "";


        // ========================================================
        // 2. THE PITCH ANIMATION ENGINE
        // ========================================================
        function animatePitch() {
            // Safety: Don't animate if the ball div doesn't exist
            if (!baseballEl) return;
            
            console.log("⚾ PITCH THROWN!");

            // Move the ball instantly to the mound (in case it got reset)
            baseballEl.className = 'on-mound';

            // Wait 50ms, then start the linear slide to home plate
            setTimeout(() => {
                baseballEl.className = 'at-plate';
            }, 50);

            // Wait 400ms (matching CSS transition), hide the ball, 
            // and snap it back to the mound for the next pitch.
            setTimeout(() => {
                baseballEl.className = 'on-mound';
            }, 410); 
        }


        // ========================================================
        // 3. REALTIME DATA LISTENER
        // ========================================================
        const gameRef = db.ref(`mlb_live_games/${GAME_PK}`);

        gameRef.on('value', (snapshot) => {
            const data = snapshot.val();
            
            if (data) {
                // Determine if a pitch was just thrown by comparing counts
                const currentCountString = `${data.count.balls}-${data.count.strikes}-${data.count.outs}`;

                // Trigger animation only if the count has changed (and it's not the first load)
                if (previousCountString && currentCountString !== previousCountString) {
                    animatePitch();
                }

                // Update the state tracker
                previousCountString = currentCountString;

                // --- Standard UI Updates ---
                document.getElementById('away-score').innerText = data.score.away;
                document.getElementById('home-score').innerText = data.score.home;
                document.getElementById('inning-state').innerText = `${data.inning.half.toUpperCase()} ${data.inning.number}`;
                document.getElementById('outs-count').innerText = data.count.outs;
                document.getElementById('pitch-count').innerText = `${data.count.balls}-${data.count.strikes}`;
                document.getElementById('pitcher-name').innerText = data.matchup.pitcher.toUpperCase();
                document.getElementById('batter-name').innerText = data.matchup.batter.toUpperCase();
                document.getElementById('last-event').innerText = data.last_event.toUpperCase();

                // Toggle base runner occupied status
                document.getElementById('base-1').classList.toggle('occupied', data.bases.first);
                document.getElementById('base-2').classList.toggle('occupied', data.bases.second);
                document.getElementById('base-3').classList.toggle('occupied', data.bases.third);

            } else {
                document.getElementById('last-event').innerText = "NO LIVE DATA FOUND FOR THIS GAME.";
            }
        }, (error) => {
            console.error("Firebase read failed: ", error);
            document.getElementById('last-event').innerText = "DATABASE CONNECTION ERROR.";
        });
    </script>
</body>
</html>
