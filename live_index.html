<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Live Baseball Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --arcade-blue: #0000a8;
            --arcade-yellow: #f8f800;
            --arcade-white: #fcfcfc;
            --dirt-brown: #c88141;
            --skin-tone: #ffcc99;
            --strike-zone-cyan: rgba(0, 255, 255, 0.6);
        }

        body {
            background-color: #111;
            color: var(--arcade-white);
            font-family: 'Press Start 2P', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            width: 800px;
            height: 600px; 
            border: 8px solid var(--arcade-white);
            position: relative;
            overflow: hidden;
            background-color: #2d8a4e;
        }

        /* --- CAMERA SYSTEM --- */
        .camera {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 0.1s ease-in-out;
        }

        #pitching-view {
            background-image: url('stadium_images/pitching_view.jpg');
            z-index: 1;
            opacity: 1;
        }

        #fielding-view {
            background-image: url('stadium_images/fenway_8bit.png');
            z-index: 2;
            opacity: 0;
        }

        /* --- STRIKE ZONE --- */
        #strike-zone-overlay {
            position: absolute;
            top: 58%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 90px;
            border: 2px solid var(--strike-zone-cyan);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            z-index: 4;
            opacity: 0; 
        }
        .zone-cell { border: 1px solid rgba(0, 255, 255, 0.2); }

        /* --- THE BATTER --- */
        #batter-container {
            position: absolute;
            top: 50%; 
            width: 30px;
            height: 60px;
            z-index: 4;
        }
        #batter-head {
            width: 14px;
            height: 14px;
            background-color: var(--skin-tone);
            position: absolute;
            top: 0;
            left: 8px;
            border: 2px solid black;
        }
        #batter-body {
            width: 20px;
            height: 40px;
            background-color: var(--arcade-white);
            position: absolute;
            top: 14px;
            left: 5px;
            border: 2px solid black;
        }
        #bat {
            width: 4px;
            height: 35px;
            background-color: var(--arcade-yellow);
            position: absolute;
            top: 20px;
            left: 13px;
            transform-origin: top center;
            transition: transform 0.08s linear; 
            z-index: 5;
            border: 1px solid black;
        }
        
        /* UPDATED SWING CLASSES */
        .swing-lefty #bat { transform: rotate(110deg) !important; }
        .swing-righty #bat { transform: rotate(-110deg) !important; }

        /* --- FIELDERS --- */
        .fielder {
            width: 14px;
            height: 14px;
            position: absolute;
            z-index: 3;
            transition: all 1.5s ease-out; 
            transform: translate(-50%, -50%);
            border: 2px solid var(--arcade-white);
        }
        #LF { background-color: #0f0; left: 20%; top: 55%; }
        #CF { background-color: #0f0; left: 50%; top: 50%; }
        #RF { background-color: #0f0; left: 80%; top: 55%; }
        #3B { background-color: var(--arcade-blue); left: 28%; top: 76%; }
        #SS { background-color: var(--arcade-blue); left: 40%; top: 70%; }
        #2B { background-color: var(--arcade-blue); left: 60%; top: 70%; }
        #1B { background-color: var(--arcade-blue); left: 72%; top: 76%; }

        /* --- THE BALL --- */
        #baseball {
            position: absolute;
            background: white;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            z-index: 5;
            opacity: 0;
            transform: translate(-50%, -50%) scale(1);
        }

        /* --- UI OVERLAY --- */
        #ui-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        #scoreboard {
            background-color: rgba(0, 0, 168, 0.9);
            border: 4px solid var(--arcade-white);
            padding: 10px;
            display: flex;
            justify-content: space-around;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            box-sizing: border-box;
        }
        .score-box { text-align: center; font-size: 14px; }
        .big-num { color: var(--arcade-yellow); font-size: 24px; display: block; margin-top: 5px; }
        #matchup-card {
            position: absolute;
            bottom: 70px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            border: 2px solid white;
            padding: 8px;
            font-size: 10px;
            line-height: 2;
            min-width: 200px; 
        }
        #bases-diamond {
            position: absolute;
            bottom: 80px;
            right: 40px;
            width: 60px;
            height: 60px;
            transform: rotate(45deg);
        }
        .base {
            width: 18px;
            height: 18px;
            background: var(--dirt-brown);
            border: 2px solid white;
            position: absolute;
        }
        .occupied { background: var(--arcade-yellow) !important; }
        #b2 { top: 0; left: 0; }
        #b1 { top: 0; right: 0; }
        #hp { bottom: 0; right: 0; background: var(--arcade-white); }
        #b3 { bottom: 0; left: 0; }
        #ticker {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 45px;
            background: black;
            border-top: 4px solid white;
            display: flex;
            align-items: center;
            padding-left: 20px;
            font-size: 12px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="pitching-view" class="camera">
            <div id="batter-container">
                <div id="bat"></div>
                <div id="batter-head"></div>
                <div id="batter-body"></div>
            </div>
            <div id="strike-zone-overlay">
                <div class="zone-cell"></div><div class="zone-cell"></div><div class="zone-cell"></div>
                <div class="zone-cell"></div><div class="zone-cell"></div><div class="zone-cell"></div>
                <div class="zone-cell"></div><div class="zone-cell"></div><div class="zone-cell"></div>
            </div>
        </div>

        <div id="fielding-view" class="camera">
            <div class="fielder" id="LF"></div>
            <div class="fielder" id="CF"></div>
            <div class="fielder" id="RF"></div>
            <div class="fielder" id="3B"></div>
            <div class="fielder" id="SS"></div>
            <div class="fielder" id="2B"></div>
            <div class="fielder" id="1B"></div>
        </div>

        <div id="baseball"></div>

        <div id="ui-layer">
            <div id="scoreboard">
                <div class="score-box"><span id="away-team">AWY</span><span id="away-pts" class="big-num">0</span></div>
                <div class="score-box" style="font-size: 10px; color: var(--arcade-yellow);">
                    <span id="inn-display">WAITING...</span><br>
                    OUTS: <span id="outs-display">0</span><br>
                    <span id="count-display">0-0</span>
                </div>
                <div class="score-box"><span id="home-team">HOM</span><span id="home-pts" class="big-num">0</span></div>
            </div>
            <div id="matchup-card">
                P: <span id="p-name" style="color: var(--arcade-yellow);">---</span><br>
                B: <span id="b-name" style="color: var(--arcade-yellow);">---</span>
            </div>
            <div id="bases-diamond">
                <div id="b2" class="base"></div><div id="b3" class="base"></div>
                <div id="b1" class="base"></div><div id="hp" class="base"></div>
            </div>
            <div id="ticker">> <span id="event-text">CONNECTING...</span></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://nbastartingfive-8b420-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const GAME_PK = "823475"; 

        const ball = document.getElementById('baseball');
        const pView = document.getElementById('pitching-view');
        const fView = document.getElementById('fielding-view');
        const szOverlay = document.getElementById('strike-zone-overlay');
        const batterContainer = document.getElementById('batter-container');
        let lastTimestamp = null;

        function resetFielders() {
            document.getElementById('LF').style.left = '20%'; document.getElementById('LF').style.top = '55%';
            document.getElementById('CF').style.left = '50%'; document.getElementById('CF').style.top = '50%';
            document.getElementById('RF').style.left = '80%'; document.getElementById('RF').style.top = '55%';
            document.getElementById('3B').style.left = '28%'; document.getElementById('3B').style.top = '76%';
            document.getElementById('SS').style.left = '40%'; document.getElementById('SS').style.top = '70%';
            document.getElementById('2B').style.left = '60%'; document.getElementById('2B').style.top = '70%';
            document.getElementById('1B').style.left = '72%'; document.getElementById('1B').style.top = '76%';
        }

        function simulateHit(hitX, hitY, eventText) {
            pView.style.opacity = "0";
            fView.style.opacity = "1";
            szOverlay.style.opacity = "0";
            batterContainer.style.opacity = "0"; 

            const isGrounder = eventText.includes('GROUND');
            const isFly = eventText.includes('FLY') || eventText.includes('POP') || eventText.includes('HOME RUN');
            const isOut = eventText.includes('OUT');

            ball.style.transition = "none";
            ball.style.top = "85%"; 
            ball.style.left = "50%";
            ball.style.transform = "translate(-50%, -50%) scale(1)";

            let targetLeft = 50;
            let targetTop = 60; 
            if (hitX !== null && hitX !== undefined && hitY !== null && hitY !== undefined) {
                targetLeft = (hitX / 250) * 100;
                targetTop = 40 + ((hitY - 20) / 180) * 45; 
            }

            let closestFielder = 'CF';
            if (targetTop > 65) { 
                if (targetLeft < 34) closestFielder = '3B';
                else if (targetLeft < 50) closestFielder = 'SS';
                else if (targetLeft < 66) closestFielder = '2B';
                else closestFielder = '1B';
            } else { 
                if (targetLeft < 38) closestFielder = 'LF';
                else if (targetLeft > 62) closestFielder = 'RF';
            }

            setTimeout(() => {
                let fielderTop = targetTop;
                if (!isOut && isGrounder && targetTop > 65) fielderTop -= 3; 
                document.getElementById(closestFielder).style.top = `${fielderTop}%`;
                document.getElementById(closestFielder).style.left = `${targetLeft}%`;
            }, 100); 

            let arriveTime = 1200; 
            if (isFly) arriveTime = 1500;
            if (isGrounder) arriveTime = 2000;

            setTimeout(() => {
                if (isFly) {
                    const apexLeft = 50 + (targetLeft - 50) * 0.5;
                    const apexTop = targetTop - 25; 
                    ball.style.transition = "all 1.5s cubic-bezier(0.25, 1, 0.5, 1)";
                    ball.style.top = `${apexTop}%`;
                    ball.style.left = `${apexLeft}%`;
                    ball.style.transform = "translate(-50%, -50%) scale(2.5)"; 
                    setTimeout(() => {
                        ball.style.transition = "all 1.5s cubic-bezier(0.5, 0, 0.75, 0)";
                        ball.style.top = `${targetTop}%`;
                        ball.style.left = `${targetLeft}%`;
                        ball.style.transform = "translate(-50%, -50%) scale(1)"; 
                    }, 1500);
                } else if (isGrounder) {
                    const midLeft = 50 + (targetLeft - 50) * 0.4;
                    const midTop = 85 + (targetTop - 85) * 0.4; 
                    ball.style.transition = "all 0.6s ease-out";
                    ball.style.top = `${midTop}%`;
                    ball.style.left = `${midLeft}%`;
                    setTimeout(() => {
                        ball.style.transition = "all 1.4s ease-out"; 
                        ball.style.top = `${targetTop}%`;
                        ball.style.left = `${targetLeft}%`;
                    }, 600);
                } else {
                    ball.style.transition = "all 1.2s linear";
                    ball.style.top = `${targetTop}%`;
                    ball.style.left = `${targetLeft}%`;
                }
            }, 50);

            setTimeout(() => {
                let throwTargetTop = 68;  
                let throwTargetLeft = 50; 
                let receivingFielder = 'SS';

                if (isGrounder && isOut) {
                    throwTargetTop = 78; 
                    throwTargetLeft = 72;
                    receivingFielder = '1B';
                }

                if (closestFielder === receivingFielder && isGrounder && isOut) {
                    document.getElementById(closestFielder).style.top = `${throwTargetTop}%`;
                    document.getElementById(closestFielder).style.left = `${throwTargetLeft}%`;
                    setTimeout(() => {
                        ball.style.transition = "all 0.5s linear";
                        ball.style.top = `${throwTargetTop}%`;
                        ball.style.left = `${throwTargetLeft}%`;
                    }, 100);
                } else {
                    document.getElementById(receivingFielder).style.top = `${throwTargetTop}%`;
                    document.getElementById(receivingFielder).style.left = `${throwTargetLeft}%`;
                    
                    setTimeout(() => {
                        ball.style.transition = "all 0.5s linear";
                        ball.style.top = `${throwTargetTop}%`;
                        ball.style.left = `${throwTargetLeft}%`;
                    }, 400);
                }
            }, arriveTime + 50);

            setTimeout(() => {
                ball.style.opacity = "0";
                resetFielders();
            }, arriveTime + 1500); 
        }

        // --- PHASE 1: PITCHING ANIMATION ---
        function runPitchAnimation(isInPlay, pX, pZ, hitX, hitY, eventText, batSide) {
            pView.style.opacity = "1";
            fView.style.opacity = "0";
            szOverlay.style.opacity = "1";
            
            batterContainer.style.opacity = "1";
            batterContainer.className = ''; 

            // FIX: Pitcher's POV mirroring.
            // Lefties stand on the 1B side (pitcher's left). Righties stand on 3B side (pitcher's right).
            if (batSide === "L") {
                batterContainer.style.left = "36%"; // 1B side
                document.getElementById('bat').style.transform = "rotate(-30deg)";
            } else {
                batterContainer.style.left = "62%"; // 3B side
                document.getElementById('bat').style.transform = "rotate(30deg)";
            }

            ball.style.transition = "none";
            ball.style.opacity = "1";
            ball.style.top = "90%";
            ball.style.left = "50%";
            ball.style.width = "16px";
            ball.style.height = "16px";
            ball.style.transform = "translate(-50%, -50%) scale(1)";

            let targetLeft = 50; 
            let targetTop = 58;  
            if (pX !== undefined && pX !== null && pZ !== undefined && pZ !== null) {
                targetLeft = 50 - (pX * 6); 
                targetTop = 75 - (pZ * 7); 
            }

            const didSwing = eventText.includes("SWINGING") || eventText.includes("FOUL") || eventText.includes("IN PLAY") || eventText.includes("HIT") || eventText.includes("MISS");

            setTimeout(() => {
                ball.style.transition = "all 0.4s linear";
                ball.style.top = `${targetTop}%`; 
                ball.style.left = `${targetLeft}%`;
                ball.style.width = "8px";
                ball.style.height = "8px";
                
                if (didSwing) {
                    setTimeout(() => {
                        batterContainer.classList.add(batSide === "L" ? "swing-lefty" : "swing-righty");
                    }, 320); 
                }
                
                if (isInPlay) {
                    setTimeout(() => {
                        simulateHit(hitX, hitY, eventText); 
                    }, 400); 
                } else {
                    setTimeout(() => {
                        ball.style.opacity = "0";
                        szOverlay.style.opacity = "0";
                        batterContainer.className = ''; 
                    }, 1500);
                }
            }, 50);
        }

        // --- FIREBASE LISTENER ---
        db.ref(`mlb_live_games/${GAME_PK}`).on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            if (data.timestamp !== lastTimestamp) {
                const eventText = data.last_event.toUpperCase();
                const inPlay = eventText.includes("IN PLAY") || eventText.includes("OUT") || eventText.includes("SINGLE") || eventText.includes("DOUBLE") || eventText.includes("HOME RUN") || eventText.includes("TRIPLE") || eventText.includes("ERROR") || eventText.includes("FIELDERS CHOICE");
                
                const pX = data.pitch_location ? data.pitch_location.pX : null;
                const pZ = data.pitch_location ? data.pitch_location.pZ : null;
                const hitX = data.hit_location ? data.hit_location.x : null;
                const hitY = data.hit_location ? data.hit_location.y : null;
                
                const batSide = data.matchup && data.matchup.bat_side ? data.matchup.bat_side : "R";
                
                runPitchAnimation(inPlay, pX, pZ, hitX, hitY, eventText, batSide);
                lastTimestamp = data.timestamp;
            }

            if (data.teams) {
                document.getElementById('away-team').innerText = data.teams.away.toUpperCase();
                document.getElementById('home-team').innerText = data.teams.home.toUpperCase();
            }
            
            document.getElementById('away-pts').innerText = data.score.away;
            document.getElementById('home-pts').innerText = data.score.home;
            document.getElementById('inn-display').innerText = `${data.inning.half} ${data.inning.number}`.toUpperCase();
            document.getElementById('outs-display').innerText = data.count.outs;
            document.getElementById('count-display').innerText = `${data.count.balls}-${data.count.strikes}`;
            
            document.getElementById('p-name').innerText = data.matchup.pitcher.toUpperCase();
            document.getElementById('b-name').innerText = data.matchup.batter.toUpperCase();
            
            document.getElementById('event-text').innerText = data.last_event.toUpperCase();

            document.getElementById('b1').classList.toggle('occupied', data.bases.first);
            document.getElementById('b2').classList.toggle('occupied', data.bases.second);
            document.getElementById('b3').classList.toggle('occupied', data.bases.third);
        });
    </script>
</body>
</html>
