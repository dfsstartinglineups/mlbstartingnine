<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Live Baseball Simulator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --arcade-blue: #0000a8;
            --arcade-yellow: #f8f800;
            --arcade-white: #fcfcfc;
            --dirt-brown: #c88141;
            --turf-green: #2d8a4e;
        }

        body {
            background-color: #111;
            color: var(--arcade-white);
            font-family: 'Press Start 2P', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            width: 800px;
            height: 600px; 
            border: 8px solid var(--arcade-white);
            position: relative;
            overflow: hidden;
            background-color: var(--turf-green);
        }

        /* --- CAMERA SYSTEM --- */
        .camera {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 0.1s ease-in-out;
        }

        #pitching-view {
            background-image: url('stadium_images/pitching_view.jpg');
            z-index: 1;
            opacity: 1; /* Active by default */
        }

        #fielding-view {
            background-image: url('stadium_images/fenway_8bit.png');
            z-index: 2;
            opacity: 0; /* Hidden by default */
        }

        /* --- UI OVERLAY --- */
        #ui-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Allows clicks to pass through to the background */
        }

        #scoreboard {
            background-color: rgba(0, 0, 168, 0.9);
            border: 4px solid var(--arcade-white);
            padding: 10px;
            display: flex;
            justify-content: space-around;
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            box-sizing: border-box;
        }

        .score-box { text-align: center; font-size: 14px; line-height: 1.5; }
        .big-num { color: var(--arcade-yellow); font-size: 24px; display: block; margin-top: 5px; }

        #matchup-card {
            position: absolute;
            bottom: 70px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            border: 2px solid var(--arcade-white);
            padding: 8px;
            font-size: 10px;
            line-height: 2;
        }

        #bases-diamond {
            position: absolute;
            bottom: 80px;
            right: 40px;
            width: 60px;
            height: 60px;
            transform: rotate(45deg);
        }

        .base {
            width: 18px;
            height: 18px;
            background: var(--dirt-brown);
            border: 2px solid var(--arcade-white);
            position: absolute;
        }
        .occupied { background: var(--arcade-yellow) !important; }
        #b1 { bottom: 0; right: 0; }
        #b2 { top: 0; right: 0; }
        #b3 { top: 0; left: 0; }
        #hp { bottom: 0; left: 0; background: var(--arcade-white); }

        #ticker {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: black;
            border-top: 4px solid var(--arcade-white);
            display: flex;
            align-items: center;
            padding-left: 20px;
            font-size: 12px;
            box-sizing: border-box;
        }

        /* --- THE BASEBALL SPRITE --- */
        #baseball {
            position: absolute;
            background: var(--arcade-white);
            border-radius: 50%;
            z-index: 5;
            opacity: 0; 
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="pitching-view" class="camera"></div>
        <div id="fielding-view" class="camera"></div>

        <div id="baseball"></div>

        <div id="ui-layer">
            <div id="scoreboard">
                <div class="score-box">AWAY<span id="away-pts" class="big-num">0</span></div>
                <div class="score-box" style="font-size: 10px; color: var(--arcade-yellow);">
                    <span id="inn-display">WAITING...</span><br>
                    OUTS: <span id="outs-display">0</span><br>
                    <span id="count-display">0-0</span>
                </div>
                <div class="score-box">HOME<span id="home-pts" class="big-num">0</span></div>
            </div>

            <div id="matchup-card">
                P: <span id="p-name" style="color: var(--arcade-yellow);">---</span><br>
                B: <span id="b-name" style="color: var(--arcade-yellow);">---</span>
            </div>

            <div id="bases-diamond">
                <div id="b2" class="base"></div>
                <div id="b3" class="base"></div>
                <div id="b1" class="base"></div>
                <div id="hp" class="base"></div>
            </div>

            <div id="ticker">> <span id="event-text">CONNECTING TO SERVER...</span></div>
        </div>
    </div>

    <script>
        // ========================================================
        // 1. FIREBASE SETUP
        // ========================================================
        const firebaseConfig = { 
            databaseURL: "https://nbastartingfive-8b420-default-rtdb.firebaseio.com/" 
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
        
        // Ensure this matches the game your Python script is pumping!
        const GAME_PK = "823475"; 

        // ========================================================
        // 2. ANIMATION ENGINE
        // ========================================================
        const ball = document.getElementById('baseball');
        const pView = document.getElementById('pitching-view');
        const fView = document.getElementById('fielding-view');
        let lastTimestamp = null;

        function runPitchAnimation(isInPlay) {
            // 1. Reset Camera to Pitching View
            pView.style.opacity = "1";
            fView.style.opacity = "0";

            // 2. Set ball to Pitcher's hand (bottom center)
            ball.style.transition = "none";
            ball.style.opacity = "1";
            ball.style.top = "80%";
            ball.style.left = "50%";
            ball.style.width = "14px";
            ball.style.height = "14px";

            // 3. Throw the pitch (scale down and move up toward plate)
            setTimeout(() => {
                ball.style.transition = "all 0.4s linear";
                ball.style.top = "30%";
                ball.style.width = "6px";
                ball.style.height = "6px";
                
                // 4. If the ball is hit, cut to the fielding camera!
                if (isInPlay) {
                    setTimeout(() => {
                        // Swap Cameras
                        pView.style.opacity = "0";
                        fView.style.opacity = "1";
                        
                        // Simulate the ball flying into the outfield
                        ball.style.transition = "all 0.6s ease-out";
                        ball.style.top = "15%"; 
                        // Randomly hit to left or right field
                        ball.style.left = Math.random() > 0.5 ? "25%" : "75%";
                    }, 350); // Cut happens right as ball reaches plate
                }
            }, 50);

            // 5. Cleanup and reset for next pitch
            setTimeout(() => {
                ball.style.opacity = "0";
                if (!isInPlay) {
                    // If it was just a strike/ball/foul, ensure we stay on pitching view
                    pView.style.opacity = "1";
                    fView.style.opacity = "0";
                }
            }, 1500);
        }

        // ========================================================
        // 3. REALTIME LISTENER
        // ========================================================
        db.ref(`mlb_live_games/${GAME_PK}`).on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                document.getElementById('event-text').innerText = "NO LIVE DATA FOUND FOR THIS GAME.";
                return;
            }

            // Trigger animation only if the timestamp changed (new pitch/event)
            if (lastTimestamp && data.timestamp !== lastTimestamp) {
                const inPlay = data.last_event.toUpperCase().includes("IN PLAY");
                runPitchAnimation(inPlay);
            }
            lastTimestamp = data.timestamp;

            // --- Update UI Text ---
            document.getElementById('away-pts').innerText = data.score.away;
            document.getElementById('home-pts').innerText = data.score.home;
            
            // Format Inning (e.g., "TOP 5")
            document.getElementById('inn-display').innerText = `${data.inning.half} ${data.inning.number}`.toUpperCase();
            
            document.getElementById('outs-display').innerText = data.count.outs;
            document.getElementById('count-display').innerText = `${data.count.balls}-${data.count.strikes}`;
            
            // Get just the last name for the matchup card to save space
            const pitcherLastName = data.matchup.pitcher.split(' ').pop().toUpperCase();
            const batterLastName = data.matchup.batter.split(' ').pop().toUpperCase();
            document.getElementById('p-name').innerText = pitcherLastName;
            document.getElementById('b-name').innerText = batterLastName;
            
            document.getElementById('event-text').innerText = data.last_event.toUpperCase();

            // --- Update Bases ---
            document.getElementById('b1').classList.toggle('occupied', data.bases.first);
            document.getElementById('b2').classList.toggle('occupied', data.bases.second);
            document.getElementById('b3').classList.toggle('occupied', data.bases.third);
        });
    </script>
</body>
</html>
